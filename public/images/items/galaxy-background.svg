<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#1a1f2e"/>
  <!-- Galaxy/stars background -->
  <circle cx="40" cy="35" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="160" cy="45" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="55" cy="155" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="150" cy="160" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="30" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="170" cy="90" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="45" cy="70" r="1" fill="#c084fc" opacity="0.6"/>
  <circle cx="155" cy="130" r="1.5" fill="#c084fc" opacity="0.5"/>
  <!-- Sparkle crosses -->
  <g transform="translate(140,40)" opacity="0.7">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <g transform="translate(50,130)" opacity="0.5">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#c084fc" stroke-width="1.2"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#c084fc" stroke-width="1.2"/>
  </g>
  <g transform="translate(160,110)" opacity="0.6">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#60a5fa" stroke-width="1"/>
  </g>
  <!-- Avatar silhouette -->
  <circle cx="100" cy="82" r="22" fill="none" stroke="#8892a4" stroke-width="3.5"/>
  <path d="M70 140 Q70 115 100 115 Q130 115 130 140" fill="none" stroke="#8892a4" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Circular aura -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#8892a4" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 6"/>
</svg>
